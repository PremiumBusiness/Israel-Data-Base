<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת איתור נתונים</title>
    <script>
        // Check for saved theme preference early to prevent flash of wrong theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            surface: '#1e293b',
                            border: '#334155',
                            text: '#f8fafc',
                            muted: '#94a3b8'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Smooth transitions */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .fade-in-scale {
            animation: fadeInScale 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-dark-bg dark:text-dark-text min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;
        
        // --- Utilities ---
        const normalizeHebrew = (str) => {
            if (!str) return '';
            return str
                .replace(/ץ/g, 'צ')
                .replace(/ף/g, 'פ')
                .replace(/ך/g, 'כ')
                .replace(/ם/g, 'מ')
                .replace(/ן/g, 'נ')
                .replace(/[קכ]/g, 'ק')
                .replace(/[טע]/g, 'ט') 
                .replace(/[תט]/g, 'ת')
                .replace(/[אע]/g, 'א')
                .replace(/ו+/g, 'ו') 
                .replace(/י+/g, 'י'); 
        };

        const levenshteinDistance = (a, b) => {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
            for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
            for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j - 1] + cost
                    );
                }
            }
            return matrix[a.length][b.length];
        };

        const fuzzyMatch = (query, text) => {
            if (!query || !text) return false;
            query = query.toLowerCase();
            text = text.toLowerCase();
            
            if (text.includes(query)) return true; 

            const normQuery = normalizeHebrew(query);
            const normText = normalizeHebrew(text);
            
            if (normText.includes(normQuery)) return true;

            if (normQuery.length > 2) {
                const words = normText.split(/\s+/);
                for (const word of words) {
                    if (Math.abs(word.length - normQuery.length) <= 1) {
                         if (levenshteinDistance(normQuery, word) <= 1) return true;
                    }
                }
            }
            return false;
        };

        // --- Highlight Component ---
        const Highlight = ({ text, term }) => {
            if (!term || !text) return <span>{text || '-'}</span>;
            const parts = text.toString().split(new RegExp(`(${term})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === term.toLowerCase() ? 
                            <span key={i} className="bg-yellow-200 dark:bg-yellow-700/60 rounded px-0.5 text-black dark:text-white transition-colors">{part}</span> : 
                            <span key={i}>{part}</span>
                    )}
                </span>
            );
        };

        // --- Icons ---
        const Icons = {
            Database: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>,
            User: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            X: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Users: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Upload: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Search: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            MapPin: (props) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Sun: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>,
            Moon: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>,
            Refresh: (props) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        };

        function App() {
            // --- State ---
            const [theme, setTheme] = useState(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
            const [activeFile, setActiveFile] = useState(null);
            const [fileEncoding, setFileEncoding] = useState('UTF-8');
            const [results, setResults] = useState([]);
            const [allLoadedData, setAllLoadedData] = useState([]); // High-speed RAM Cache
            
            const [searchTerm, setSearchTerm] = useState({ idNumber: '', firstName: '', lastName: '', city: '', address: '' });
            const [triggerSearch, setTriggerSearch] = useState(0); 
            
            const [selectedRecord, setSelectedRecord] = useState(null);
            
            const [isSearching, setIsSearching] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [scanProgress, setScanProgress] = useState(0);
            const [totalRecords, setTotalRecords] = useState(0);
            
            const [status, setStatus] = useState('המערכת מוכנה. טען קובץ כדי להתחיל.');
            const fileInputRef = useRef(null);
            const searchTimeoutRef = useRef(null);

            // --- Theme Effect ---
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [theme]);

            const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');

            // --- File Processing ---
            const detectEncoding = async (file) => {
                const chunk = file.slice(0, 50000); 
                const buffer = await new Promise(res => {
                    const r = new FileReader();
                    r.onload = ev => res(ev.target.result);
                    r.readAsArrayBuffer(chunk);
                });
                try {
                    const decoderUtf8 = new TextDecoder('utf-8', { fatal: true });
                    const textUtf8 = decoderUtf8.decode(buffer);
                    if (/[\u0590-\u05FF]/.test(textUtf8)) return 'UTF-8';
                } catch (e) {
                    return 'windows-1255'; 
                }
                return 'windows-1255'; 
            };

            const parseLine = (line, id) => {
                let cleanLine = line.trim();
                
                if (cleanLine.startsWith("'") && cleanLine.endsWith("'")) {
                    cleanLine = cleanLine.slice(1, -1);
                } else if (cleanLine.startsWith('"') && cleanLine.endsWith('"')) {
                    cleanLine = cleanLine.slice(1, -1);
                }

                let sep = ',';
                if (cleanLine.includes("','")) sep = "','";
                else if (cleanLine.includes('","')) sep = '","';
                else if (cleanLine.includes('\t')) sep = '\t';
                else if (cleanLine.includes(';')) sep = ';';

                const parts = cleanLine.split(sep).map(p => p.trim());
                
                let idNumber = '', firstName = '', lastName = '', city = '', address = '';
                
                const idCandidate = parts.find(p => /^\d{5,9}$/.test(p) && p.length >= 7); 
                
                if (idCandidate) {
                    idNumber = idCandidate;
                    const otherParts = parts.filter(p => p !== idCandidate);
                    firstName = otherParts[0] || '';
                    lastName = otherParts[1] || '';
                    
                    const addressPart = parts.find(p => p.includes(','));
                    if (addressPart) {
                        const addrParts = addressPart.split(',');
                        address = addrParts[0].trim();
                        city = addrParts.slice(1).join(',').trim();
                    } else {
                        city = otherParts[3] || otherParts[2] || '';
                        address = otherParts[4] || otherParts[3] || '';
                    }
                } else {
                    firstName = parts[1] || parts[0] || '';
                    lastName = parts[2] || parts[1] || '';
                    city = parts[4] || parts[3] || '';
                    address = parts[5] || parts[4] || '';
                }

                return { id, idNumber, firstName, lastName, city, address };
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setIsScanning(true);
                setScanProgress(0);
                setTotalRecords(0);
                setStatus('מנתח קובץ ומזהה קידוד עברית...');
                setActiveFile(file);
                
                try {
                    const encoding = await detectEncoding(file);
                    setFileEncoding(encoding);
                    
                    let offset = 0;
                    const CHUNK_SIZE = 1024 * 1024 * 5; 
                    let totalLines = 0;
                    let initialResults = [];
                    let fullCache = []; 
                    
                    // הגדלת ה-RAM עד 150 מגה-בייט (כ-1.5 עד 2 מיליון שורות) לתוך הזיכרון המהיר
                    const MAX_RAM_SIZE = 150 * 1024 * 1024; 
                    const useRAM = file.size <= MAX_RAM_SIZE;
                    
                    while (offset < file.size) {
                        const chunk = file.slice(offset, offset + CHUNK_SIZE);
                        const text = await new Promise(res => {
                            const r = new FileReader();
                            r.onload = ev => res(ev.target.result);
                            r.readAsText(chunk, encoding);
                        });
                        
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        
                        if (offset === 0) {
                            for(let i=0; i < Math.min(lines.length, 100); i++) {
                                initialResults.push(parseLine(lines[i], i));
                            }
                            setResults(initialResults);
                        }
                        
                        if (useRAM) {
                             for(let i=0; i < lines.length; i++) {
                                 fullCache.push(parseLine(lines[i], totalLines + i));
                             }
                        }

                        totalLines += lines.length;
                        
                        offset += CHUNK_SIZE;
                        const progress = Math.min(100, Math.round((offset / file.size) * 100));
                        setScanProgress(progress);
                        setStatus(`סורק נתונים... ${progress}%`);
                        
                        await new Promise(r => setTimeout(r, 5)); 
                    }
                    
                    if (totalLines === 0 && initialResults.length > 0) totalLines = initialResults.length;
                    
                    if (useRAM) setAllLoadedData(fullCache);
                    setTotalRecords(totalLines);
                    setStatus(`קובץ נטען בהצלחה. סה"כ ${totalLines.toLocaleString()} רשומות.`);
                } catch (error) {
                    setStatus('שגיאה בטעינת הקובץ.');
                    console.error(error);
                } finally {
                    setIsScanning(false);
                    if(fileInputRef.current) fileInputRef.current.value = '';
                }
            };

            // --- Reset Function ---
            const handleReset = () => {
                setSearchTerm({ idNumber: '', firstName: '', lastName: '', city: '', address: '' });
                if (allLoadedData.length > 0) {
                    setResults(allLoadedData.slice(0, 100));
                } else {
                    setResults([]);
                }
                setStatus(totalRecords > 0 ? `החיפוש אופס. מוכן לסריקת ${totalRecords.toLocaleString()} רשומות.` : 'המערכת מוכנה.');
            };

            // --- Search Engine ---
            const performSearch = useCallback(async () => {
                if (!activeFile || isScanning) return;

                const activeTerms = Object.keys(searchTerm).reduce((acc, key) => {
                    if (searchTerm[key].trim() !== '') acc[key] = searchTerm[key].trim();
                    return acc;
                }, {});

                if (Object.keys(activeTerms).length === 0) return;

                setIsSearching(true);
                setStatus('מצליב נתונים...');
                
                const found = [];
                let isCancelled = false;

                try {
                    // RAM SEARCH (Super Fast) - מתבצע אם הקובץ קטן מ-150MB
                    if (allLoadedData.length > 0) {
                        setStatus('סורק נתונים מתוך הזיכרון (RAM)...');
                        let chunkIndex = 0;
                        const BATCH_SIZE = 100000; 
                        
                        while (chunkIndex < allLoadedData.length && found.length < 200) {
                            const end = Math.min(chunkIndex + BATCH_SIZE, allLoadedData.length);
                            
                            for (let i = chunkIndex; i < end; i++) {
                                const row = allLoadedData[i];
                                let preciseMatch = true;
                                
                                for (const [key, val] of Object.entries(activeTerms)) {
                                    if (!fuzzyMatch(val, row[key])) {
                                        preciseMatch = false;
                                        break;
                                    }
                                }
                                if (preciseMatch) {
                                    found.push(row);
                                    if (found.length >= 200) break; 
                                }
                            }
                            chunkIndex = end;
                            if (chunkIndex < allLoadedData.length) {
                                await new Promise(r => setTimeout(r, 0)); // שומר על הממשק שלא יקפא
                            }
                        }
                    } 
                    // DISK SEARCH (Fallback for HUGE files)
                    else {
                        setStatus('קובץ ענק - סורק ישירות מהדיסק (קריאה במנות)...');
                        let offset = 0;
                        const CHUNK_SIZE = 1024 * 1024 * 2; 
                        let leftover = '';
                        let rowId = 0;

                        while (offset < activeFile.size && found.length < 200) {
                            const chunk = activeFile.slice(offset, offset + CHUNK_SIZE);
                            const text = await new Promise(res => {
                                const r = new FileReader();
                                r.onload = e => res(e.target.result);
                                r.readAsText(chunk, fileEncoding);
                            });

                            const lines = (leftover + text).split(/\r?\n/);
                            leftover = lines.pop(); 

                            for (let i = 0; i < lines.length; i++) {
                                const line = lines[i];
                                if (!line.trim()) continue;
                                
                                let isMatch = true;
                                const lowerLine = line.toLowerCase();
                                for (const val of Object.values(activeTerms)) {
                                    if (!fuzzyMatch(val, lowerLine)) {
                                        isMatch = false;
                                        break;
                                    }
                                }

                                if (isMatch) {
                                    const parsed = parseLine(line, rowId++);
                                    let preciseMatch = true;
                                    for (const [key, val] of Object.entries(activeTerms)) {
                                        if (!fuzzyMatch(val, parsed[key])) {
                                            preciseMatch = false;
                                            break;
                                        }
                                    }
                                    if (preciseMatch) {
                                        found.push(parsed);
                                        if (found.length >= 200) break; 
                                    }
                                }
                            }
                            offset += CHUNK_SIZE;
                            await new Promise(r => setTimeout(r, 5)); 
                        }
                    }
                    
                    setResults(found);
                    setStatus(found.length > 0 ? `נמצאו ${found.length} התאמות.` : 'לא נמצאו תוצאות.');
                } catch (err) {
                    setStatus('שגיאה במהלך החיפוש.');
                } finally {
                    setIsSearching(false);
                }
            }, [activeFile, isScanning, fileEncoding, searchTerm, allLoadedData]);

            useEffect(() => {
                const activeVals = Object.values(searchTerm).join('');
                if (!activeVals) return;

                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);

                if (triggerSearch > 0) {
                    performSearch();
                } else {
                    searchTimeoutRef.current = setTimeout(() => {
                        performSearch();
                    }, 500);
                }

                return () => {
                    if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                };
            }, [searchTerm, triggerSearch, performSearch]);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                    setTriggerSearch(prev => prev + 1);
                }
            };

            // --- Handlers ---
            const openRecord = (row) => setSelectedRecord(row);
            const closeRecord = () => setSelectedRecord(null);

            const searchByAddress = (address, city, e) => {
                if(e) e.stopPropagation();
                setSearchTerm({ idNumber: '', firstName: '', lastName: '', city: city || '', address: address || '' });
                setTriggerSearch(prev => prev + 1);
                setSelectedRecord(null);
            };

            const relatedPersons = useMemo(() => {
                if (!selectedRecord || allLoadedData.length === 0) return [];
                return allLoadedData.filter(p => 
                    p.id !== selectedRecord.id && (
                        (p.address && selectedRecord.address && p.address === selectedRecord.address) ||
                        (p.lastName && selectedRecord.lastName && p.lastName === selectedRecord.lastName && p.city === selectedRecord.city)
                    )
                ).slice(0, 5); 
            }, [selectedRecord, allLoadedData]);


            return (
                <div className="min-h-screen font-sans transition-colors duration-300">
                    <header className="max-w-7xl mx-auto bg-white dark:bg-dark-surface p-5 rounded-2xl shadow-sm mt-6 mb-6 flex flex-col md:flex-row justify-between items-center border border-slate-200 dark:border-dark-border gap-4 transition-colors duration-300">
                        <div className="flex flex-col">
                            <h1 className="text-2xl font-bold flex items-center gap-3 text-slate-800 dark:text-dark-text transition-colors">
                                <div className="p-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl transition-colors">
                                    <Icons.Database />
                                </div>
                                מערכת איתור נתונים
                            </h1>
                            <p className="text-sm text-slate-500 dark:text-dark-muted mt-1 transition-colors">{status}</p>
                        </div>
                        <div className="flex items-center gap-4 md:gap-6">
                            <button 
                                onClick={toggleTheme} 
                                className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-colors"
                                aria-label="Toggle Dark Mode"
                            >
                                {theme === 'dark' ? <Icons.Sun /> : <Icons.Moon />}
                            </button>
                            {totalRecords > 0 && !isScanning && (
                                <div className="text-right hidden md:block px-4 border-r border-slate-200 dark:border-dark-border transition-colors">
                                    <p className="text-xs text-slate-400 dark:text-dark-muted font-semibold uppercase tracking-wider">סה"כ רשומות</p>
                                    <p className="text-xl font-mono font-bold text-slate-700 dark:text-dark-text transition-colors">{totalRecords.toLocaleString()}</p>
                                </div>
                            )}
                            <button onClick={() => fileInputRef.current.click()} disabled={isScanning} className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 disabled:opacity-50 text-white px-6 py-3 rounded-xl flex items-center gap-2 transition-all shadow-md font-semibold text-sm">
                                <Icons.Upload /> {activeFile ? 'החלף נתונים' : 'טען נתונים'}
                            </button>
                            <input type="file" ref={fileInputRef} className="hidden" accept=".txt,.csv" onChange={handleFileUpload} />
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto bg-white dark:bg-dark-surface p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-dark-border relative min-h-[600px] transition-colors duration-300">
                        
                        {isScanning && (
                            <div className="absolute inset-0 bg-white/90 dark:bg-dark-bg/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center rounded-2xl fade-in-scale">
                                <div className="w-16 h-16 border-4 border-slate-100 dark:border-slate-800 border-t-blue-600 rounded-full animate-spin mb-6"></div>
                                <h3 className="text-2xl font-bold text-slate-800 dark:text-dark-text mb-2 transition-colors">טוען וסורק קובץ...</h3>
                                <p className="text-slate-500 dark:text-dark-muted font-medium mb-6 transition-colors">{status}</p>
                                <div className="w-64 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden border border-slate-200 dark:border-dark-border transition-colors">
                                    <div className="h-full bg-blue-600 transition-all duration-200" style={{ width: `${scanProgress}%` }}></div>
                                </div>
                            </div>
                        )}

                        {isSearching && !isScanning && (
                            <div className="absolute inset-0 bg-white/60 dark:bg-dark-bg/60 backdrop-blur-[2px] z-10 flex items-center justify-center rounded-2xl transition-all">
                                <div className="bg-white dark:bg-dark-surface p-5 rounded-2xl shadow-xl flex items-center gap-4 border border-slate-100 dark:border-dark-border transition-colors">
                                    <div className="w-8 h-8 border-4 border-slate-200 dark:border-slate-700 border-t-blue-600 rounded-full animate-spin"></div>
                                    <span className="font-bold text-slate-700 dark:text-dark-text transition-colors">מחפש נתונים, אנא המתן...</span>
                                </div>
                            </div>
                        )}

                        <div className="mb-2 flex justify-between items-end">
                             <h3 className="text-sm font-bold text-slate-500 dark:text-slate-400">מסנני חיפוש:</h3>
                             <button 
                                onClick={handleReset} 
                                disabled={isScanning || !activeFile}
                                className="flex items-center gap-1.5 text-xs font-semibold bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 py-1.5 px-3 rounded-lg transition-colors disabled:opacity-50"
                             >
                                <Icons.Refresh /> נקה ואיפוס חיפוש
                             </button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6 relative z-0">
                            {['idNumber', 'firstName', 'lastName', 'city', 'address'].map((key) => {
                                const placeholders = { idNumber: 'חפש ת.ז', firstName: 'שם פרטי', lastName: 'שם משפחה', city: 'עיר', address: 'רחוב / כתובת' };
                                return (
                                    <input 
                                        key={key}
                                        disabled={isScanning} 
                                        placeholder={placeholders[key]} 
                                        className="p-3.5 bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all disabled:opacity-50 text-sm font-medium dark:text-dark-text dark:placeholder-slate-500" 
                                        value={searchTerm[key]} 
                                        onChange={e => setSearchTerm({...searchTerm, [key]: e.target.value})}
                                        onKeyDown={handleKeyDown}
                                    />
                                );
                            })}
                        </div>
                        
                        <div className="overflow-auto h-[550px] border border-slate-200 dark:border-dark-border rounded-xl custom-scrollbar transition-colors">
                            <table className="w-full text-right border-collapse">
                                <thead className="bg-slate-100 dark:bg-slate-800 sticky top-0 z-0 transition-colors">
                                    <tr>
                                        {['תעודת זהות', 'שם פרטי', 'שם משפחה', 'עיר', 'כתובת'].map((th, i) => (
                                            <th key={i} className="p-4 text-slate-600 dark:text-slate-300 font-bold border-b border-slate-200 dark:border-dark-border whitespace-nowrap transition-colors">{th}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {results.length === 0 ? (
                                        <tr>
                                            <td colSpan="5" className="p-16 text-center text-slate-400 dark:text-dark-muted transition-colors">
                                                <Icons.Search className="mx-auto mb-4 opacity-40" size={48} />
                                                <p className="text-lg font-medium">אין נתונים להצגה.</p>
                                                <p className="text-sm mt-1">טען קובץ מבוסס פסיקים וחפש נתונים. (לחץ Enter לחיפוש מהיר)</p>
                                            </td>
                                        </tr>
                                    ) : (
                                        results.map((row, idx) => (
                                            <tr key={idx} className="border-b border-slate-100 dark:border-dark-border hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer transition-colors group" onClick={() => openRecord(row)}>
                                                <td className="p-4 font-mono text-blue-700 dark:text-blue-400 font-medium transition-colors">
                                                    <Highlight text={row.idNumber} term={searchTerm.idNumber} />
                                                </td>
                                                <td className="p-4 font-medium text-slate-800 dark:text-dark-text transition-colors">
                                                    <Highlight text={row.firstName} term={searchTerm.firstName} />
                                                </td>
                                                <td className="p-4 font-medium text-slate-800 dark:text-dark-text transition-colors">
                                                    <Highlight text={row.lastName} term={searchTerm.lastName} />
                                                </td>
                                                <td className="p-4 text-slate-600 dark:text-slate-400 transition-colors">
                                                    <Highlight text={row.city} term={searchTerm.city} />
                                                </td>
                                                <td className="p-4 text-slate-600 dark:text-slate-400 transition-colors">
                                                    <span 
                                                        className="hover:text-blue-600 dark:hover:text-blue-400 hover:underline decoration-blue-300 underline-offset-4 rounded transition-all"
                                                        onClick={(e) => searchByAddress(row.address, row.city, e)}
                                                        title="לחץ לחיפוש כל מי שגר בכתובת זו"
                                                    >
                                                        <Highlight text={row.address} term={searchTerm.address} />
                                                    </span>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </main>

                    {/* Modal */}
                    {selectedRecord && (
                        <div className="fixed inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 transition-all" onClick={closeRecord}>
                            <div className="bg-white dark:bg-dark-surface rounded-2xl w-full max-w-2xl shadow-2xl relative overflow-hidden flex flex-col fade-in-scale border border-transparent dark:border-dark-border transition-colors" onClick={e => e.stopPropagation()}>
                                
                                <div className="bg-gradient-to-l from-blue-600 to-indigo-700 dark:from-blue-800 dark:to-indigo-900 p-6 text-white flex items-center gap-5 relative transition-colors">
                                    <button className="absolute top-4 left-4 p-2 bg-white/10 text-white hover:bg-white/20 rounded-full transition-all" onClick={closeRecord}>
                                        <Icons.X />
                                    </button>
                                    
                                    <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center shrink-0 border-2 border-white/30 shadow-inner">
                                        <Icons.User size={32} />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold mb-1">{selectedRecord.firstName} {selectedRecord.lastName}</h2>
                                        <div className="inline-block bg-black/20 px-3 py-1 rounded-lg">
                                            <span className="text-white font-mono text-sm tracking-widest">{selectedRecord.idNumber || 'ללא תעודת זהות'}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 overflow-y-auto max-h-[70vh] custom-scrollbar">
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-50 dark:bg-dark-bg p-4 rounded-xl border border-slate-100 dark:border-dark-border shadow-sm transition-colors">
                                            <p className="text-xs text-slate-500 dark:text-dark-muted mb-1 font-semibold uppercase">עיר מגורים</p>
                                            <p className="font-bold text-slate-800 dark:text-dark-text text-lg">{selectedRecord.city || '-'}</p>
                                        </div>
                                        <div className="bg-slate-50 dark:bg-dark-bg p-4 rounded-xl border border-slate-100 dark:border-dark-border shadow-sm transition-colors">
                                            <p className="text-xs text-slate-500 dark:text-dark-muted mb-1 font-semibold uppercase">רחוב / כתובת</p>
                                            <p 
                                                className="font-bold text-blue-600 dark:text-blue-400 text-lg line-clamp-1 cursor-pointer hover:underline underline-offset-4" 
                                                title="לחץ לחיפוש בכתובת זו"
                                                onClick={() => searchByAddress(selectedRecord.address, selectedRecord.city)}
                                            >
                                                {selectedRecord.address || '-'}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {/* Related Connections Section */}
                                    {relatedPersons.length > 0 && (
                                        <div className="mb-6 fade-in-scale">
                                            <h3 className="text-sm font-bold text-slate-700 dark:text-slate-300 mb-3 flex items-center gap-2">
                                                <Icons.Users size={16} /> קשרים אפשריים (בכתובת או במשפחה)
                                            </h3>
                                            <div className="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                                                {relatedPersons.map(person => (
                                                    <div 
                                                        key={person.id} 
                                                        onClick={() => setSelectedRecord(person)}
                                                        className="flex-shrink-0 bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800 p-3 rounded-lg cursor-pointer hover:shadow-md transition-all w-40"
                                                    >
                                                        <p className="font-bold text-sm text-slate-800 dark:text-slate-200 truncate">{person.firstName} {person.lastName}</p>
                                                        <p className="text-xs text-slate-500 dark:text-slate-400 font-mono mt-1">{person.idNumber}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mb-8 rounded-xl overflow-hidden border border-slate-200 dark:border-dark-border shadow-sm relative bg-slate-100 dark:bg-slate-800 transition-colors">
                                        <div className="absolute top-3 right-3 bg-white/95 dark:bg-dark-surface/95 backdrop-blur-sm px-3 py-1.5 rounded-lg text-xs font-bold text-slate-700 dark:text-slate-300 shadow-sm flex items-center gap-1.5 z-10 pointer-events-none transition-colors">
                                            <Icons.MapPin className="text-blue-600 dark:text-blue-400" /> מיקום במפה
                                        </div>
                                        <iframe 
                                            className="w-full h-56 opacity-90 dark:opacity-80" 
                                            src={`https://maps.google.com/maps?q=${encodeURIComponent((selectedRecord.address || '') + ' ' + (selectedRecord.city || ''))}&t=m&z=17&output=embed`} 
                                            title="מפת גוגל"
                                            loading="lazy"
                                        ></iframe>
                                    </div>
                                    
                                    <button className="bg-blue-600 hover:bg-indigo-700 dark:bg-blue-700 dark:hover:bg-indigo-600 text-white w-full py-4 rounded-xl flex items-center justify-center gap-3 transition-all font-bold text-lg shadow-lg hover:shadow-indigo-500/30 dark:shadow-none" 
                                            onClick={() => searchByAddress(selectedRecord.address, selectedRecord.city)}>
                                        <Icons.Users /> איתור כל בני המשפחה / השכנים בכתובת זו
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
