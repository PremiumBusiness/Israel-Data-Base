<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת איתור נתונים מתקדמת</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --soft: #f1f5f9;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --danger-text: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-box {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #dbeafe;
      color: var(--primary);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      padding: 20px;
      margin-bottom: 18px;
    }

    .upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .upload-area svg {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .upload-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .upload-note {
      color: var(--muted);
      font-size: 14px;
    }

    #fileInput {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: var(--soft);
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .alert {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      white-space: pre-line;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: var(--soft);
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      cursor: pointer;
      user-select: none;
      color: #334155;
      font-weight: 800;
      white-space: nowrap;
    }

    th:hover {
      background: #e2e8f0;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .header { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .page { padding: 18px 10px; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <header class="header">
        <div class="title-wrap">
          <div class="icon-box" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
          </div>
          <div>
            <h1>מערכת איתור נתונים מתקדמת</h1>
            <p class="subtitle">עמוד HTML תקין שעובד גם בלי React, Babel או Tailwind.</p>
          </div>
        </div>
      </header>

      <section class="card">
        <label id="uploadArea" class="upload-area" for="fileInput" tabindex="0" role="button" aria-label="בחירת קובץ">
          <svg xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
            <path d="M12 12v9"></path>
            <path d="m16 16-4-4-4 4"></path>
          </svg>
          <div class="upload-title">בחר קובץ נתונים</div>
        </label>
        <input id="fileInput" type="file" accept=".txt,.csv,.json,text/plain,text/csv,application/json" />
      </section>

      <section class="card">
        <div class="grid">
          <div>
            <label for="idNumber">תעודת זהות</label>
            <input id="idNumber" type="text" placeholder="לדוגמה: 123456789" />
          </div>
          <div>
            <label for="firstName">שם פרטי</label>
            <input id="firstName" type="text" placeholder="שם פרטי" />
          </div>
          <div>
            <label for="lastName">שם משפחה</label>
            <input id="lastName" type="text" placeholder="שם משפחה" />
          </div>
          <div>
            <label for="city">עיר</label>
            <input id="city" type="text" placeholder="עיר" />
          </div>
          <div>
            <label for="address">כתובת</label>
            <input id="address" type="text" placeholder="כתובת" />
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" id="searchBtn">חיפוש</button>
          <button class="btn-secondary" id="clearBtn">ניקוי</button>
          <button class="btn-secondary" id="demoBtn">טעינת נתוני דוגמה</button>
        </div>
      </section>

      <section class="card">
        <div id="alert" class="alert"></div>
        <div class="status">
          <span id="fileStatus">לא נטען קובץ.</span>
          <span id="resultStatus">0 תוצאות</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-key="idNumber">תעודת זהות <span class="sort"></span></th>
                <th data-key="firstName">שם פרטי <span class="sort"></span></th>
                <th data-key="lastName">שם משפחה <span class="sort"></span></th>
                <th data-key="city">עיר <span class="sort"></span></th>
                <th data-key="address">כתובת <span class="sort"></span></th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td class="empty" colspan="5">אין נתונים להצגה.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      filteredRows: [],
      columns: [],
      sortKey: null,
      sortDirection: "asc",
      lastEncoding: null
    };

    const baseColumns = [
      { key: "idNumber", label: "תעודת זהות" },
      { key: "firstName", label: "שם פרטי" },
      { key: "lastName", label: "שם משפחה" },
      { key: "city", label: "עיר" },
      { key: "address", label: "כתובת" }
    ];

    const fields = baseColumns.map(function(column) { return column.key; });
    const labels = {};
    baseColumns.forEach(function(column) { labels[column.key] = column.label; });
    const MAX_ROWS_TO_RENDER = 2000;

    const uploadArea = document.getElementById("uploadArea");
    const fileInput = document.getElementById("fileInput");
    const fileStatus = document.getElementById("fileStatus");
    const resultStatus = document.getElementById("resultStatus");
    const tbody = document.getElementById("tbody");
    const theadRow = document.querySelector("thead tr");
    const alertBox = document.getElementById("alert");

    function showError(message) {
      alertBox.textContent = message;
      alertBox.style.display = "block";
      alertBox.style.background = "#fef2f2";
      alertBox.style.borderColor = "#fecaca";
      alertBox.style.color = "#991b1b";
    }

    function showInfo(message) {
      alertBox.textContent = message;
      alertBox.style.display = "block";
      alertBox.style.background = "#eff6ff";
      alertBox.style.borderColor = "#bfdbfe";
      alertBox.style.color = "#1e40af";
    }

    function clearError() {
      alertBox.textContent = "";
      alertBox.style.display = "none";
      alertBox.style.background = "";
      alertBox.style.borderColor = "";
      alertBox.style.color = "";
    }

    function normalizeText(value) {
      return String(value == null ? "" : value).trim().toLowerCase();
    }

    function normalizeHeader(value) {
      let text = String(value == null ? "" : value);
      let clean = "";
      for (let i = 0; i < text.length; i++) {
        const code = text.charCodeAt(i);
        if (code !== 65279 && code !== 8206 && code !== 8207) clean += text[i];
      }
      return clean.trim().toLowerCase();
    }

    function columnLabel(key) {
      if (labels[key]) return labels[key];
      if (key === "rawText") return "שורה מקורית";
      if (key.indexOf("_col") === 0) return "עמודה " + key.replace("_col", "");
      return key;
    }

    function isDigit(char) {
      const code = char.charCodeAt(0);
      return code >= 48 && code <= 57;
    }

    function extractId(text) {
      const s = String(text == null ? "" : text);
      let current = "";
      for (let i = 0; i <= s.length; i++) {
        const char = i < s.length ? s[i] : " ";
        if (i < s.length && isDigit(char)) {
          current += char;
        } else {
          if (current.length >= 5 && current.length <= 10) return current;
          current = "";
        }
      }
      return "";
    }

    function splitLines(text) {
      const result = [];
      let current = "";
      const s = String(text == null ? "" : text);

      for (let i = 0; i < s.length; i++) {
        const code = s.charCodeAt(i);
        if (code === 13 || code === 10) {
          const trimmed = current.trim();
          if (trimmed) result.push(trimmed);
          current = "";
          if (code === 13 && i + 1 < s.length && s.charCodeAt(i + 1) === 10) i++;
        } else if (code !== 0 && code !== 65279) {
          current += s[i];
        }
      }

      const trimmed = current.trim();
      if (trimmed) result.push(trimmed);
      return result;
    }

    function splitDelimitedLine(line, delimiter) {
      if (delimiter === "MULTISPACE") return splitByMultipleSpaces(line);

      const result = [];
      let current = "";
      let inQuotes = false;
      const s = String(line == null ? "" : line);

      for (let i = 0; i < s.length; i++) {
        const char = s[i];
        const next = i + 1 < s.length ? s[i + 1] : "";

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === delimiter && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function splitByMultipleSpaces(line) {
      const result = [];
      let current = "";
      let spaces = "";
      const s = String(line == null ? "" : line);

      for (let i = 0; i < s.length; i++) {
        const char = s[i];
        const code = char.charCodeAt(0);
        const isSpace = code === 32 || code === 9;

        if (isSpace) {
          spaces += char;
        } else {
          if (spaces.length >= 2) {
            if (current.trim()) result.push(current.trim());
            current = "";
          } else {
            current += spaces;
          }
          spaces = "";
          current += char;
        }
      }

      if (current.trim()) result.push(current.trim());
      return result;
    }

    function detectDelimiter(lines) {
      const sample = lines.slice(0, 30);
      const delimiters = [String.fromCharCode(9), ";", ",", "|", "#"];
      let bestDelimiter = null;
      let bestScore = 0;

      delimiters.forEach(function(delimiter) {
        let rowsWithDelimiter = 0;
        let totalParts = 0;
        sample.forEach(function(line) {
          const parts = splitDelimitedLine(line, delimiter).length;
          if (parts > 1) {
            rowsWithDelimiter++;
            totalParts += parts;
          }
        });
        const score = rowsWithDelimiter * 10 + totalParts;
        if (score > bestScore) {
          bestScore = score;
          bestDelimiter = delimiter;
        }
      });

      if (bestDelimiter) return bestDelimiter;

      let multiSpaceRows = 0;
      sample.forEach(function(line) {
        if (splitByMultipleSpaces(line).length > 1) multiSpaceRows++;
      });
      if (multiSpaceRows >= Math.max(1, Math.floor(sample.length * 0.4))) return "MULTISPACE";

      return null;
    }

    function containsAny(text, words) {
      const value = normalizeHeader(text);
      return words.some(function(word) { return value.indexOf(word) >= 0; });
    }

    function looksLikeHeader(parts, nextParts) {
      const firstLine = parts.join(" ");
      const nextLine = (nextParts || []).join(" ");
      const hasKnownHeader = containsAny(firstLine, [
        "תעודת זהות", "מספר זהות", "תז", "ת.ז", "שם פרטי", "שם משפחה", "כתובת", "עיר", "יישוב", "ישוב", "id", "first", "last", "address", "city"
      ]);
      const firstHasId = !!extractId(firstLine);
      const nextHasId = !!extractId(nextLine);
      return hasKnownHeader || (!firstHasId && nextHasId && parts.length > 1);
    }

    function uniqueKey(key, used) {
      let candidate = key || "column";
      let index = 2;
      while (used[candidate]) {
        candidate = key + "_" + index;
        index++;
      }
      used[candidate] = true;
      return candidate;
    }

    function mapHeaderToKey(header, index, used) {
      const h = normalizeHeader(header);
      let key = String(header || "").trim() || "_col" + (index + 1);

      if (containsAny(h, ["תעודת זהות", "מספר זהות", "מספר תעודת זהות", "ת.ז", "תז", "idnumber", "id number", "zehut"])) key = "idNumber";
      else if (containsAny(h, ["שם פרטי", "firstname", "first name"])) key = "firstName";
      else if (containsAny(h, ["שם משפחה", "משפחה", "lastname", "last name"])) key = "lastName";
      else if (containsAny(h, ["עיר", "יישוב", "ישוב", "city", "town"])) key = "city";
      else if (containsAny(h, ["כתובת", "רחוב", "address", "street"])) key = "address";

      return uniqueKey(key, used);
    }

    function normalizeRow(row) {
      const normalized = {};
      Object.keys(row || {}).forEach(function(key) {
        normalized[normalizeHeader(key)] = row[key];
      });

      const result = Object.assign({}, row);
      result.idNumber = result.idNumber || result.id || result.ID || normalized["תעודת זהות"] || normalized["תז"] || normalized["ת.ז"] || normalized["מספר זהות"] || normalized["מספר תעודת זהות"] || normalized["idnumber"] || normalized["id number"] || "";
      result.firstName = result.firstName || result.first_name || result.FirstName || normalized["שם פרטי"] || normalized["firstname"] || normalized["first name"] || "";
      result.lastName = result.lastName || result.last_name || result.LastName || normalized["שם משפחה"] || normalized["משפחה"] || normalized["lastname"] || normalized["last name"] || "";
      result.city = result.city || result.City || normalized["עיר"] || normalized["ישוב"] || normalized["יישוב"] || normalized["city"] || "";
      result.address = result.address || result.Address || normalized["כתובת"] || normalized["רחוב"] || normalized["address"] || "";
      return result;
    }

    function hasUsefulValue(row) {
      return Object.values(row || {}).some(function(value) { return String(value == null ? "" : value).trim() !== ""; });
    }

    function enrichRowFromValues(row, values) {
      if (!row.idNumber) {
        for (let i = 0; i < values.length; i++) {
          const id = extractId(values[i]);
          if (id) {
            row.idNumber = id;
            break;
          }
        }
      }
      return row;
    }

    function parseFreeTextLine(line) {
      return normalizeRow({ idNumber: extractId(line), rawText: line });
    }

    function parseDelimitedText(text) {
      const lines = splitLines(text);
      if (!lines.length) return { rows: [], columns: baseColumns };

      const delimiter = detectDelimiter(lines);
      const rows = [];
      let columns = [];

      if (delimiter) {
        const firstParts = splitDelimitedLine(lines[0], delimiter);
        const secondParts = lines[1] ? splitDelimitedLine(lines[1], delimiter) : [];
        const hasHeader = looksLikeHeader(firstParts, secondParts);
        const used = {};

        if (hasHeader && lines.length >= 2) {
          const keys = firstParts.map(function(header, index) { return mapHeaderToKey(header, index, used); });
          columns = keys.map(function(key) { return { key: key, label: columnLabel(key) }; });

          lines.slice(1).forEach(function(line) {
            const values = splitDelimitedLine(line, delimiter);
            const row = {};
            keys.forEach(function(key, index) { row[key] = values[index] || ""; });
            rows.push(enrichRowFromValues(normalizeRow(row), values));
          });
        } else {
          let maxColumnCount = 1;
          lines.slice(0, 100).forEach(function(line) {
            maxColumnCount = Math.max(maxColumnCount, splitDelimitedLine(line, delimiter).length);
          });
          const keys = [];
          for (let i = 0; i < maxColumnCount; i++) keys.push("_col" + (i + 1));
          columns = keys.map(function(key) { return { key: key, label: columnLabel(key) }; });

          lines.forEach(function(line) {
            const values = splitDelimitedLine(line, delimiter);
            const row = { rawText: line };
            keys.forEach(function(key, index) { row[key] = values[index] || ""; });
            rows.push(enrichRowFromValues(normalizeRow(row), values));
          });
        }
      } else {
        columns = [
          { key: "idNumber", label: "תעודת זהות" },
          { key: "rawText", label: "שורה מקורית" }
        ];
        lines.forEach(function(line) { rows.push(parseFreeTextLine(line)); });
      }

      const cleanRows = rows.filter(hasUsefulValue);
      return { rows: cleanRows, columns: mergeColumns(columns, cleanRows) };
    }

    function parseJson(text) {
      const data = JSON.parse(text);
      const rawRows = Array.isArray(data) ? data : data.rows || data.data || [];
      if (!Array.isArray(rawRows)) return { rows: [], columns: baseColumns };
      const rows = rawRows.map(normalizeRow).filter(hasUsefulValue);
      return { rows: rows, columns: mergeColumns(baseColumns, rows) };
    }

    function mergeColumns(preferredColumns, rows) {
      const result = [];
      const used = {};

      function addColumn(column) {
        const key = typeof column === "string" ? column : column.key;
        if (!key || used[key]) return;
        const hasValue = rows.length === 0 || rows.some(function(row) { return String(row[key] == null ? "" : row[key]).trim() !== ""; });
        if (!hasValue && fields.indexOf(key) < 0) return;
        used[key] = true;
        result.push({ key: key, label: typeof column === "string" ? columnLabel(column) : (column.label || columnLabel(key)) });
      }

      preferredColumns.forEach(addColumn);
      baseColumns.forEach(addColumn);
      rows.slice(0, 100).forEach(function(row) {
        Object.keys(row).forEach(function(key) {
          if (key !== "rawText") addColumn(key);
        });
      });
      if (rows.some(function(row) { return row.rawText; })) addColumn({ key: "rawText", label: "שורה מקורית" });
      return result.length ? result : baseColumns;
    }

    function countHebrewCharacters(text) {
      let count = 0;
      const s = String(text == null ? "" : text);
      for (let i = 0; i < s.length; i++) {
        const code = s.charCodeAt(i);
        if (code >= 1424 && code <= 1535) count++;
      }
      return count;
    }

    function countBadCharacters(text) {
      let count = 0;
      const s = String(text == null ? "" : text);
      for (let i = 0; i < s.length; i++) {
        const code = s.charCodeAt(i);
        if (code === 65533 || s[i] === "×") count++;
      }
      return count;
    }

    function decodeWindows1255Manually(buffer) {
      const bytes = new Uint8Array(buffer);
      const hebrew = {
        224: "א", 225: "ב", 226: "ג", 227: "ד", 228: "ה", 229: "ו", 230: "ז", 231: "ח", 232: "ט", 233: "י",
        234: "ך", 235: "כ", 236: "ל", 237: "ם", 238: "מ", 239: "ן", 240: "נ", 241: "ס", 242: "ע", 243: "ף",
        244: "פ", 245: "ץ", 246: "צ", 247: "ק", 248: "ר", 249: "ש", 250: "ת", 164: "₪"
      };
      let output = "";
      for (let i = 0; i < bytes.length; i++) {
        const byte = bytes[i];
        if (byte < 128) output += String.fromCharCode(byte);
        else output += hebrew[byte] || String.fromCharCode(byte);
      }
      return output;
    }

    function scoreText(text) {
      return countHebrewCharacters(text) * 5 + splitLines(text).length - countBadCharacters(text) * 40;
    }

    function decodeTextFromBuffer(buffer) {
      const bytes = new Uint8Array(buffer);

      if (bytes.length >= 3 && bytes[0] === 239 && bytes[1] === 187 && bytes[2] === 191) {
        return { text: new TextDecoder("utf-8").decode(buffer), encoding: "UTF-8 BOM" };
      }

      const candidates = [
        { label: "utf-8", name: "UTF-8" },
        { label: "windows-1255", name: "Windows-1255 עברית" },
        { label: "iso-8859-8", name: "ISO-8859-8 עברית" }
      ];

      let best = null;
      candidates.forEach(function(candidate) {
        try {
          const text = new TextDecoder(candidate.label).decode(buffer);
          const option = { text: text, encoding: candidate.name, score: scoreText(text) };
          if (!best || option.score > best.score) best = option;
        } catch (error) {}
      });

      const manual = decodeWindows1255Manually(buffer);
      const manualOption = { text: manual, encoding: "Windows-1255 עברית - פענוח ידני", score: scoreText(manual) };
      if (!best || manualOption.score > best.score) best = manualOption;

      return { text: best.text, encoding: best.encoding };
    }

    function setRows(rows, fileName, encoding, columns) {
      state.rows = rows;
      state.filteredRows = rows;
      state.columns = columns && columns.length ? columns : mergeColumns(baseColumns, rows);
      state.lastEncoding = encoding || null;
      fileStatus.textContent = fileName ? "נטען קובץ: " + fileName + (encoding ? " | קידוד: " + encoding : "") : "נטענו נתוני דוגמה.";
      renderTable();
    }

    function renderHeader() {
      theadRow.innerHTML = state.columns.map(function(column) {
        return '<th data-key="' + escapeHtml(column.key) + '">' + escapeHtml(column.label || columnLabel(column.key)) + ' <span class="sort"></span></th>';
      }).join("");

      document.querySelectorAll("th[data-key]").forEach(function(th) {
        th.addEventListener("click", function() {
          const key = th.dataset.key;
          if (state.sortKey === key) state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
          else {
            state.sortKey = key;
            state.sortDirection = "asc";
          }
          renderTable();
        });
      });
    }

    function renderTable() {
      if (!state.columns.length) state.columns = baseColumns;
      renderHeader();

      let rows = state.filteredRows.slice();
      if (state.sortKey) {
        rows.sort(function(a, b) {
          const aValue = normalizeText(a[state.sortKey]);
          const bValue = normalizeText(b[state.sortKey]);
          return state.sortDirection === "asc" ? aValue.localeCompare(bValue, "he") : bValue.localeCompare(aValue, "he");
        });
      }

      const shownRows = rows.slice(0, MAX_ROWS_TO_RENDER);
      resultStatus.textContent = rows.length > MAX_ROWS_TO_RENDER ? "מציג " + shownRows.length + " מתוך " + rows.length + " תוצאות" : rows.length + " תוצאות";

      document.querySelectorAll("th[data-key]").forEach(function(th) {
        const span = th.querySelector(".sort");
        span.textContent = th.dataset.key === state.sortKey ? (state.sortDirection === "asc" ? "▲" : "▼") : "";
      });

      if (!shownRows.length) {
        tbody.innerHTML = '<tr><td class="empty" colspan="' + state.columns.length + '">אין נתונים להצגה.</td></tr>';
        return;
      }

      tbody.innerHTML = shownRows.map(function(row) {
        return "<tr>" + state.columns.map(function(column) {
          return "<td>" + escapeHtml(row[column.key] || "") + "</td>";
        }).join("") + "</tr>";
      }).join("");
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .split("&").join("&amp;")
        .split("<").join("&lt;")
        .split(">").join("&gt;")
        .split('"').join("&quot;")
        .split("'").join("&#039;");
    }

    function rowContains(row, value) {
      return Object.values(row || {}).some(function(cell) { return normalizeText(cell).indexOf(value) >= 0; });
    }

    function searchRows() {
      clearError();
      const params = {};
      fields.forEach(function(field) { params[field] = normalizeText(document.getElementById(field).value); });

      state.filteredRows = state.rows.filter(function(row) {
        return fields.every(function(field) {
          if (!params[field]) return true;
          return normalizeText(row[field]).indexOf(params[field]) >= 0 || rowContains(row, params[field]);
        });
      });

      renderTable();
    }

    function clearSearch() {
      clearError();
      fields.forEach(function(field) { document.getElementById(field).value = ""; });
      state.filteredRows = state.rows;
      renderTable();
    }

    function loadDemoData() {
      clearError();
      setRows([
        { idNumber: "123456789", firstName: "דוד", lastName: "כהן", city: "ירושלים", address: "הרצל 10" },
        { idNumber: "987654321", firstName: "משה", lastName: "לוי", city: "תל אביב", address: "דיזנגוף 25" },
        { idNumber: "111222333", firstName: "שרה", lastName: "מזרחי", city: "חיפה", address: "הנמל 7" }
      ], null, null, baseColumns);
    }

    async function handleFile(file) {
      clearError();
      const name = file.name || "";
      const ext = name.toLowerCase().split(".").pop();

      if (["mdb", "a", "a2", "a3"].indexOf(ext) >= 0) {
        fileStatus.textContent = "נבחר קובץ: " + name;
        showError("הדפדפן לא יכול לקרוא ישירות קובץ Access או קובץ אגרון. צריך להמיר אותו קודם ל TXT, CSV או JSON.");
        return;
      }

      try {
        const buffer = await file.arrayBuffer();
        const decoded = decodeTextFromBuffer(buffer);
        const parsed = ext === "json" ? parseJson(decoded.text) : parseDelimitedText(decoded.text);

        if (!parsed.rows.length) {
          showError("הקובץ נקרא, אבל לא נמצאו שורות להצגה. הקוד החדש תומך גם בקובץ TXT בלי שורת כותרות, לכן אם ההודעה חוזרת כנראה שהקובץ ריק או לא טקסטואלי.");
        } else {
          showInfo("הקובץ נקרא בהצלחה. זוהו " + parsed.rows.length + " שורות. קידוד: " + decoded.encoding);
        }

        setRows(parsed.rows, name, decoded.encoding, parsed.columns);
      } catch (error) {
        showError("אירעה שגיאה בקריאת הקובץ: " + error.message);
      }
    }

    uploadArea.addEventListener("keydown", function(event) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fileInput.click();
      }
    });
    fileInput.addEventListener("change", function(event) {
      const file = event.target.files && event.target.files[0];
      if (file) handleFile(file);
    });

    document.getElementById("searchBtn").addEventListener("click", searchRows);
    document.getElementById("clearBtn").addEventListener("click", clearSearch);
    document.getElementById("demoBtn").addEventListener("click", loadDemoData);

    fields.forEach(function(field) {
      document.getElementById(field).addEventListener("keydown", function(event) { if (event.key === "Enter") searchRows(); });
    });

    renderTable();
  </script>
</body>
</html>
