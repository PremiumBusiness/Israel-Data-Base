<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת איתור נתונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo } = React;
        
        // תיקון הייבוא של האייקונים מהספריה הגלובלית lucide
        const Database = lucide.Database;
        const Search = lucide.Search;
        const User = lucide.User;
        const X = lucide.X;
        const MapPin = lucide.MapPin;
        const Users = lucide.Users;
        const Upload = lucide.Upload;

        function App() {
            const [data, setData] = useState([]);
            const [searchTerm, setSearchTerm] = useState({ idNumber: '', firstName: '', lastName: '', city: '' });
            const [selectedRecord, setSelectedRecord] = useState(null);
            const fileInputRef = useRef(null);

            const processFile = (file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const rows = e.target.result.split('\n').filter(l => l.trim()).map((line, i) => {
                        const [idNumber, firstName, lastName, city, address] = line.split(',');
                        return { id: i, idNumber: idNumber?.trim(), firstName: firstName?.trim(), lastName: lastName?.trim(), city: city?.trim(), address: address?.trim() };
                    });
                    setData(rows);
                };
                reader.readAsText(file);
            };

            const filteredData = useMemo(() => {
                return data.filter(item => 
                    (searchTerm.idNumber === '' || item.idNumber?.includes(searchTerm.idNumber)) &&
                    (searchTerm.firstName === '' || item.firstName?.includes(searchTerm.firstName)) &&
                    (searchTerm.lastName === '' || item.lastName?.includes(searchTerm.lastName)) &&
                    (searchTerm.city === '' || item.city?.includes(searchTerm.city))
                );
            }, [data, searchTerm]);

            return (
                <div className="min-h-screen bg-slate-50 p-6 font-sans">
                    <header className="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow mb-6 flex justify-between items-center">
                        <h1 className="text-xl font-bold flex items-center gap-2"><Database className="text-blue-600" /> מערכת איתור נתונים</h1>
                        <button onClick={() => fileInputRef.current.click()} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                            <Upload size={18} /> טען קובץ CSV
                        </button>
                        <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => processFile(e.target.files[0])} />
                    </header>

                    <main className="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <input placeholder="ת.ז" className="p-2 border rounded" onChange={e => setSearchTerm({...searchTerm, idNumber: e.target.value})} />
                            <input placeholder="שם פרטי" className="p-2 border rounded" onChange={e => setSearchTerm({...searchTerm, firstName: e.target.value})} />
                            <input placeholder="שם משפחה" className="p-2 border rounded" onChange={e => setSearchTerm({...searchTerm, lastName: e.target.value})} />
                            <input placeholder="עיר" className="p-2 border rounded" onChange={e => setSearchTerm({...searchTerm, city: e.target.value})} />
                        </div>
                        <div className="overflow-auto h-[500px] border rounded-lg">
                            <table className="w-full text-right border-collapse">
                                <thead className="bg-slate-100 sticky top-0">
                                    <tr><th className="p-3">ת.ז</th><th className="p-3">שם פרטי</th><th className="p-3">שם משפחה</th><th className="p-3">עיר</th></tr>
                                </thead>
                                <tbody>
                                    {filteredData.map(row => (
                                        <tr key={row.id} className="border-t hover:bg-blue-50 cursor-pointer" onClick={() => setSelectedRecord(row)}>
                                            <td className="p-3">{row.idNumber}</td><td className="p-3">{row.firstName}</td><td className="p-3">{row.lastName}</td><td className="p-3">{row.city}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>

                    {selectedRecord && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onClick={() => setSelectedRecord(null)}>
                            <div className="bg-white rounded-xl p-6 w-96 relative shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-2 left-2 p-1" onClick={() => setSelectedRecord(null)}><X /></button>
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><User /> {selectedRecord.firstName} {selectedRecord.lastName}</h2>
                                <p className="mb-1"><strong>ת.ז:</strong> {selectedRecord.idNumber}</p>
                                <p className="mb-4"><strong>כתובת:</strong> {selectedRecord.address}, {selectedRecord.city}</p>
                                <iframe className="w-full h-40 mt-2 border rounded" src={`https://maps.google.com/maps?q=${encodeURIComponent(selectedRecord.address + ', ' + selectedRecord.city)}&output=embed`} />
                                <button className="mt-4 bg-blue-600 text-white w-full py-2 rounded flex items-center justify-center gap-2" 
                                        onClick={() => {setSearchTerm({...searchTerm, lastName: selectedRecord.lastName}); setSelectedRecord(null)}}>
                                    <Users size={18} /> חפש בני משפחה
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
