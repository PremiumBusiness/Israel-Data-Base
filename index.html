<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Data Base System</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React & ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Load Babel to compile JSX in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback } = React;
        const { Search, UploadCloud, Database, User, Shield, X, Download, Copy, SearchX, Bell } = lucide;

        function App() {
            const [activeFile, setActiveFile] = useState(null);
            const [data, setData] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setActiveFile(file);
                    // כאן ניתן להוסיף לוגיקת קריאה לקובץ
                    setData([{ _id: 1, firstName: 'דוגמה', lastName: 'ישראל', idNumber: '123456789', city: 'חיפה', address: 'הרצל 1' }]);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-5xl mx-auto flex items-center justify-between mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                            <Database className="text-blue-600" /> Israel Data Base
                        </h1>
                        <button 
                            onClick={() => fileInputRef.current?.click()}
                            className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors"
                        >
                            טען קובץ נתונים
                        </button>
                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                    </header>

                    <main className="max-w-5xl mx-auto">
                        {!activeFile ? (
                            <div className="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-slate-300">
                                <UploadCloud size={48} className="mx-auto text-slate-400 mb-4" />
                                <h2 className="text-xl font-semibold text-slate-700">לא נטען קובץ</h2>
                                <p className="text-slate-500">לחץ על כפתור "טען קובץ נתונים" כדי להתחיל</p>
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 border-b border-slate-100">
                                    <input 
                                        type="text" 
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="חיפוש מהיר..."
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                <table className="w-full text-right">
                                    <thead className="bg-slate-50 text-slate-600 text-sm">
                                        <tr>
                                            <th className="p-4">ת.ז</th>
                                            <th className="p-4">שם פרטי</th>
                                            <th className="p-4">שם משפחה</th>
                                            <th className="p-4">עיר</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data.map(row => (
                                            <tr key={row._id} className="border-t border-slate-100 hover:bg-slate-50">
                                                <td className="p-4 font-mono">{row.idNumber}</td>
                                                <td className="p-4">{row.firstName}</td>
                                                <td className="p-4">{row.lastName}</td>
                                                <td className="p-4">{row.city}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
