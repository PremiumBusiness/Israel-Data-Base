<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת איתור נתונים מתקדמת</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --soft: #f1f5f9;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --danger-text: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-box {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #dbeafe;
      color: var(--primary);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      padding: 20px;
      margin-bottom: 18px;
    }

    .upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .upload-area svg {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .upload-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .upload-note {
      color: var(--muted);
      font-size: 14px;
    }

    input[type="file"] {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: var(--soft);
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .alert {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      white-space: pre-line;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: var(--soft);
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      cursor: pointer;
      user-select: none;
      color: #334155;
      font-weight: 800;
      white-space: nowrap;
    }

    th:hover {
      background: #e2e8f0;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .header { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .page { padding: 18px 10px; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <header class="header">
        <div class="title-wrap">
          <div class="icon-box" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
          </div>
          <div>
            <h1>מערכת איתור נתונים מתקדמת</h1>
            <p class="subtitle">עמוד HTML תקין שעובד גם בלי React, Babel או Tailwind.</p>
          </div>
        </div>
      </header>

      <section class="card">
        <div id="uploadArea" class="upload-area" tabindex="0" role="button" aria-label="בחירת קובץ">
          <svg xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
            <path d="M12 12v9"></path>
            <path d="m16 16-4-4-4 4"></path>
          </svg>
          <div class="upload-title">בחר קובץ נתונים</div>
          <div class="upload-note">העמוד קורא CSV או JSON. קובצי Access/MDB כמו ‎.a3 צריכים המרה בצד שרת או המרה ל־CSV.</div>
        </div>
        <input id="fileInput" type="file" accept=".csv,.json,.txt,.mdb,.a,.a2,.a3" />
      </section>

      <section class="card">
        <div class="grid">
          <div>
            <label for="idNumber">תעודת זהות</label>
            <input id="idNumber" type="text" placeholder="לדוגמה: 123456789" />
          </div>
          <div>
            <label for="firstName">שם פרטי</label>
            <input id="firstName" type="text" placeholder="שם פרטי" />
          </div>
          <div>
            <label for="lastName">שם משפחה</label>
            <input id="lastName" type="text" placeholder="שם משפחה" />
          </div>
          <div>
            <label for="city">עיר</label>
            <input id="city" type="text" placeholder="עיר" />
          </div>
          <div>
            <label for="address">כתובת</label>
            <input id="address" type="text" placeholder="כתובת" />
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" id="searchBtn">חיפוש</button>
          <button class="btn-secondary" id="clearBtn">ניקוי</button>
          <button class="btn-secondary" id="demoBtn">טעינת נתוני דוגמה</button>
        </div>
      </section>

      <section class="card">
        <div id="alert" class="alert"></div>
        <div class="status">
          <span id="fileStatus">לא נטען קובץ.</span>
          <span id="resultStatus">0 תוצאות</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-key="idNumber">תעודת זהות <span class="sort"></span></th>
                <th data-key="firstName">שם פרטי <span class="sort"></span></th>
                <th data-key="lastName">שם משפחה <span class="sort"></span></th>
                <th data-key="city">עיר <span class="sort"></span></th>
                <th data-key="address">כתובת <span class="sort"></span></th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td class="empty" colspan="5">אין נתונים להצגה.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      filteredRows: [],
      sortKey: null,
      sortDirection: "asc"
    };

    const fields = ["idNumber", "firstName", "lastName", "city", "address"];
    const labels = {
      idNumber: "תעודת זהות",
      firstName: "שם פרטי",
      lastName: "שם משפחה",
      city: "עיר",
      address: "כתובת"
    };

    const uploadArea = document.getElementById("uploadArea");
    const fileInput = document.getElementById("fileInput");
    const fileStatus = document.getElementById("fileStatus");
    const resultStatus = document.getElementById("resultStatus");
    const tbody = document.getElementById("tbody");
    const alertBox = document.getElementById("alert");

    function showError(message) {
      alertBox.textContent = message;
      alertBox.style.display = "block";
    }

    function clearError() {
      alertBox.textContent = "";
      alertBox.style.display = "none";
    }

    function normalizeText(value) {
      return String(value ?? "").trim().toLowerCase();
    }

    function normalizeRow(row) {
      return {
        idNumber: row.idNumber ?? row.id ?? row["תעודת זהות"] ?? row["תז"] ?? row["מספר זהות"] ?? "",
        firstName: row.firstName ?? row.first_name ?? row["שם פרטי"] ?? row["שם"] ?? "",
        lastName: row.lastName ?? row.last_name ?? row["שם משפחה"] ?? row["משפחה"] ?? "",
        city: row.city ?? row["עיר"] ?? row["ישוב"] ?? row["יישוב"] ?? "",
        address: row.address ?? row["כתובת"] ?? row["רחוב"] ?? ""
      };
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
      if (lines.length < 2) return [];

      const headers = splitCsvLine(lines[0]).map(header => header.trim());
      return lines.slice(1).map(line => {
        const values = splitCsvLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] ?? "";
        });
        return normalizeRow(row);
      });
    }

    function splitCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function parseJson(text) {
      const data = JSON.parse(text);
      const rows = Array.isArray(data) ? data : data.rows || data.data || [];
      if (!Array.isArray(rows)) return [];
      return rows.map(normalizeRow);
    }

    function setRows(rows, fileName) {
      state.rows = rows;
      state.filteredRows = rows;
      fileStatus.textContent = fileName ? `נטען קובץ: ${fileName}` : "נטענו נתוני דוגמה.";
      renderTable();
    }

    function renderTable() {
      let rows = [...state.filteredRows];

      if (state.sortKey) {
        rows.sort((a, b) => {
          const aValue = normalizeText(a[state.sortKey]);
          const bValue = normalizeText(b[state.sortKey]);
          return state.sortDirection === "asc"
            ? aValue.localeCompare(bValue, "he")
            : bValue.localeCompare(aValue, "he");
        });
      }

      resultStatus.textContent = `${rows.length} תוצאות`;

      document.querySelectorAll("th[data-key]").forEach(th => {
        const span = th.querySelector(".sort");
        if (th.dataset.key === state.sortKey) {
          span.textContent = state.sortDirection === "asc" ? "▲" : "▼";
        } else {
          span.textContent = "";
        }
      });

      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td class="empty" colspan="5">אין נתונים להצגה.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.idNumber)}</td>
          <td>${escapeHtml(row.firstName)}</td>
          <td>${escapeHtml(row.lastName)}</td>
          <td>${escapeHtml(row.city)}</td>
          <td>${escapeHtml(row.address)}</td>
        </tr>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function searchRows() {
      clearError();
      const params = {};
      fields.forEach(field => {
        params[field] = normalizeText(document.getElementById(field).value);
      });

      state.filteredRows = state.rows.filter(row => {
        return fields.every(field => {
          if (!params[field]) return true;
          return normalizeText(row[field]).includes(params[field]);
        });
      });

      renderTable();
    }

    function clearSearch() {
      clearError();
      fields.forEach(field => document.getElementById(field).value = "");
      state.filteredRows = state.rows;
      renderTable();
    }

    function loadDemoData() {
      clearError();
      setRows([
        { idNumber: "123456789", firstName: "דוד", lastName: "כהן", city: "ירושלים", address: "הרצל 10" },
        { idNumber: "987654321", firstName: "משה", lastName: "לוי", city: "תל אביב", address: "דיזנגוף 25" },
        { idNumber: "111222333", firstName: "שרה", lastName: "מזרחי", city: "חיפה", address: "הנמל 7" }
      ]);
    }

    function handleFile(file) {
      clearError();
      const name = file.name || "";
      const ext = name.toLowerCase().split(".").pop();

      if (["mdb", "a", "a2", "a3"].includes(ext)) {
        fileStatus.textContent = `נבחר קובץ: ${name}`;
        showError(
          "העמוד נטען תקין, אבל דפדפן לא יודע לקרוא ישירות קובץ Access/MDB או קובצי אגרון כמו ‎.a3.\n" +
          "כדי להציג נתונים כאן, צריך קודם להמיר את הקובץ ל־CSV/JSON או לבנות צד שרת שקורא את בסיס הנתונים."
        );
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const text = String(reader.result || "");
          const rows = ext === "json" ? parseJson(text) : parseCsv(text);

          if (!rows.length) {
            showError("הקובץ נקרא, אבל לא נמצאו בו שורות נתונים מתאימות.");
          }

          setRows(rows, name);
        } catch (error) {
          showError("אירעה שגיאה בקריאת הקובץ: " + error.message);
        }
      };

      reader.onerror = () => {
        showError("הדפדפן לא הצליח לקרוא את הקובץ.");
      };

      reader.readAsText(file, "utf-8");
    }

    uploadArea.addEventListener("click", () => fileInput.click());
    uploadArea.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") fileInput.click();
    });

    fileInput.addEventListener("change", event => {
      const file = event.target.files && event.target.files[0];
      if (file) handleFile(file);
    });

    document.getElementById("searchBtn").addEventListener("click", searchRows);
    document.getElementById("clearBtn").addEventListener("click", clearSearch);
    document.getElementById("demoBtn").addEventListener("click", loadDemoData);

    fields.forEach(field => {
      document.getElementById(field).addEventListener("keydown", event => {
        if (event.key === "Enter") searchRows();
      });
    });

    document.querySelectorAll("th[data-key]").forEach(th => {
      th.addEventListener("click", () => {
        const key = th.dataset.key;
        if (state.sortKey === key) {
          state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDirection = "asc";
        }
        renderTable();
      });
    });

    renderTable();
  </script>
</body>
</html>
